---
# NAS storage overlay for Voicebox (NFS — MONOLITH, 192.168.4.44)
#
#   docker compose -f docker-compose.yml -f docker-compose.cuda.yml \
#                  -f docker-compose.nas.yml up -d
#
# Values come from .env (already gitignored):
#   NAS_ADDR=192.168.4.44
#   NAS_GENERATIONS_EXPORT=/volume1/Public/Novel-Echoes-Books/generations
#   NAS_BACKUPS_EXPORT=/volume1/Public/Novel-Echoes-Books/backups
# (Use the NAS's own mount path, shown in its NFS permissions dialog — NOT the
#  UNC path \\MONOLITH\Public\... which is SMB.)
#
# WHY NFS AND NOT CIFS — tested, not assumed. Docker Desktop's local driver
# cannot mount CIFS here: every variant (share root vs subpath, vers 2.1/3.0/
# 3.1.1, sec=ntlmssp) failed identically with `operation not supported`. The
# kernel lists cifs in /proc/filesystems, but the driver calls mount() directly
# and CIFS needs the mount.cifs helper, which isn't in the VM. NFS by contrast
# reached the network (a probe returned `connection refused` against the NAS's
# closed 2049) — so NFS mounting genuinely works; the NAS just needs it enabled.
#
# WHY A NAMED VOLUME RATHER THAN A BIND MOUNT TO A MAPPED DRIVE: bind-mounting
# Z: would route container -> 9p/drvfs -> Windows -> SMB -> NAS, stacking a
# network hop on top of the 9p bridge that already throws `OSError [Errno 5]`
# under sustained write load. This mounts inside the Linux VM, so drvfs is out
# of the path entirely — which is the whole point of moving.
#
# WHAT DELIBERATELY STAYS LOCAL: voicebox.db and profiles/ remain on the
# `voicebox-data` ext4 volume. SQLite over a network share has unreliable file
# locking and is a documented corruption risk. Only write-once files go to the
# NAS: rendered audio, and completed backup snapshots (static once written, so
# the NAS cloud-sync can carry them offsite — which is what finally makes them
# a real backup rather than a copy sharing a volume with the DB it protects).
#
# `hard` is intentional: on a network blip an unattended render stalls and
# retries rather than erroring out mid-chapter.

services:
  voicebox:
    volumes:
      # Rendered audio -> NAS. Replaces the ./output bind mount from the base
      # file (compose merges service volumes by target path).
      - generations-nas:/app/data/generations
      # DB snapshots -> NAS, for offsite cloud sync.
      - backups-nas:/app/data/backups

volumes:
  generations-nas:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${NAS_ADDR},nfsvers=${NAS_NFSVERS:-3},rw,hard"
      device: ":${NAS_GENERATIONS_EXPORT}"

  backups-nas:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${NAS_ADDR},nfsvers=${NAS_NFSVERS:-3},rw,hard"
      device: ":${NAS_BACKUPS_EXPORT}"
