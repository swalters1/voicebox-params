name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck app + web
        run: bun run typecheck

      - name: Build web smoke test
        run: bun run build:web

  # Fork-added. Upstream CI is frontend-only, so until now nothing exercised the
  # backend and the fork's tests ran only on a developer's machine — where they
  # would have rotted silently. These cover the reliability logic this fork
  # exists for: the verify gate's STT windowing and the recast inheritance rules.
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Deliberately NOT the full requirements.txt — that drags in the whole ML
      # stack (chatterbox, transformers, CUDA wheels) for tests that render no
      # audio and load no model. This is the minimal import closure, verified by
      # running the suite in a clean venv.
      #
      # torch is required but only as an import: backend/utils/cache.py uses
      # torch.load/save for the voice-prompt cache and is pulled in transitively
      # by routes/generations.py. The CPU wheel is enough and avoids the
      # multi-GB CUDA download.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-asyncio fastapi 'sqlalchemy>=2' pydantic \
                      numpy soundfile librosa pillow typing_extensions python-multipart \
                      httpx pedalboard

      # The whole DIRECTORY, not a list of filenames: a new fork test file is
      # picked up automatically. The previous approach pinned filenames here,
      # and twice a new file was added without updating the list — a green run
      # that had silently skipped the tests written to catch a bug.
      #
      # Upstream's tests stay in the parent directory and are not run yet: they
      # predate this fork and have not been audited against CI's lean
      # dependency set. Widening to backend/tests/ is a follow-up, not a reason
      # to pin a red suite now.
      - name: Run fork backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest backend/tests/fork/ -v --asyncio-mode=auto
